name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - run: deno task build
      # GitHub Pages is static hosting, so the SPA routes /resume/en and
      # /resume/pt have no matching file. The 404.html fallback below lets
      # vue-router recover them client-side, BUT it is served with an HTTP 404
      # status — and LinkedIn's crawler honours that status and refuses to
      # render a link preview (Discord/WhatsApp/Facebook parse the body
      # regardless, which is why those work). So we also materialise real
      # 200-status files at those routes, each with its own canonical og:url
      # (LinkedIn deduplicates previews by og:url).
      - name: Generate per-language pages and SPA fallback
        run: |
          for lang in en pt; do
            mkdir -p "dist/$lang"
            sed "s#content=\"https://pedrodelarisso.github.io/resume/\"#content=\"https://pedrodelarisso.github.io/resume/$lang/\"#" \
              dist/index.html > "dist/$lang/index.html"
          done
          cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
